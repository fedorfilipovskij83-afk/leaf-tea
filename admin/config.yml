backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

site_url: "chipper-genie-e55600.netlify.app"  # ← Твоя новая ссылка

collections:
  - name: "products"
    label: "Товары"
    folder: "_data/products"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: "Название"
        name: "title"
        widget: "string"
        required: true

      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - { label: "Зелёный чай", value: "green" }
          - { label: "Чёрный чай", value: "black" }
          - { label: "Улун", value: "oolong" }
          - { label: "Пуэр", value: "puer" }
          - { label: "Чайная посуда", value: "teaware" }
        required: true

      - label: "Описание"
        name: "description"
        widget: "text"
        required: true

      - label: "Цена (₽)"
        name: "price"
        widget: "number"
        value_type: "int"
        required: true

      - label: "Фотографии"
        name: "images"
        widget: "list"
        allow_add: true
        field:
          label: "Фото"
          name: "image"
          widget: "image"

      - label: "Опубликован"
        name: "published"
        widget: "boolean"
        default: true
