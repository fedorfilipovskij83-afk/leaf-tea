<!DOCTYPE html>
<html>
<head>
    <title>Проверка логотипа</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #284E3D;
        }
        .logo-fixed {
            position: fixed;
            top: 30px;
            right: 30px;
        }
        .logo-img {
            width: 150px;
            height: auto;
        }
    </style>
</head>
<body>
    <h1 style="color: #EDEDED;">Проверка логотипа</h1>
    
    <div class="logo-fixed">
        <img src="logo.png" alt="LeafTea" class="logo-img">
    </div>
    
    <p style="color: #EDEDED; margin-top: 100px;">
        Если логотип справа сверху появился — всё работает!
    </p>
</body>
</html>
